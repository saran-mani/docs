name: Deploy to S3 + CloudFront

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Sync to S3
        run: |
          aws s3 sync build/ s3://${{ secrets.S3_BUCKET_PROD }} \
            --delete \
            --cache-control "public, max-age=31536000" \
            --exclude "index.html"

          aws s3 cp build/index.html s3://${{ secrets.S3_BUCKET_PROD }}/index.html \
            --cache-control "no-cache, no-store, must-revalidate"

      - name: Update CloudFront Basic Auth
        run: |
          sed -i 's|BASIC_AUTH_PLACEHOLDER|${{ secrets.BASIC_AUTH_STRING_PROD }}|g' cloudfront-auth.js

          aws cloudfront update-function \
            --name basic-auth \
            --function-code fileb://cloudfront-auth.js \
            --function-config Comment="Basic Auth",Runtime="cloudfront-js-2.0"

          aws cloudfront publish-function \
            --name basic-auth \
            --if-match $(aws cloudfront describe-function \
              --name basic-auth \
              --query 'ETag' --output text)

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DIST_ID_PROD }} \
            --paths "/*"